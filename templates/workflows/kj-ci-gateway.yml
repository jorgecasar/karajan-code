# Karajan CI Gateway — publishes PR comments and reviews from repository_dispatch events.
# Triggered by Karajan Code pipeline via `gh api repos/{owner}/{repo}/dispatches`.
#
# Required secrets:
#   KJ_CI_APP_ID      — GitHub App ID for kj-reviewer
#   KJ_CI_PRIVATE_KEY — PEM private key for the GitHub App

name: Karajan CI Gateway

on:
  repository_dispatch:
    types:
      - kj-comment
      - kj-review

permissions:
  contents: read
  pull-requests: write

jobs:
  gateway:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.KJ_CI_APP_ID }}
          private-key: ${{ secrets.KJ_CI_PRIVATE_KEY }}

      - name: Post Comment
        if: github.event.action == 'kj-comment'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { pr_number, agent, body } = context.payload.client_payload;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              body: `**${agent}** (via Karajan CI)\n\n${body}`
            });

      - name: Submit Review
        if: github.event.action == 'kj-review'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { pr_number, event, body, agent } = context.payload.client_payload;
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
              event: event,
              body: `**${agent}** (via Karajan CI)\n\n${body}`
            });
