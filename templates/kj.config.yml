# AI Agents
coder: codex
reviewer: claude

# Review settings
review_mode: standard
max_iterations: 5
review_rules: ./review-rules.md
base_branch: main

# Coder settings
coder_options:
  model: null
  auto_approve: true

# Reviewer settings
reviewer_options:
  output_format: json
  require_schema: true
  model: null
  deterministic: true
  retries: 1
  fallback_reviewer: codex

# Development methodology
development:
  methodology: tdd
  require_test_changes: true
  test_file_patterns:
    - /tests/
    - /__tests__/
    - .test.
    - .spec.

# SonarQube settings
sonarqube:
  enabled: true
  host: http://localhost:9000
  token: null
  quality_gate: true
  enforcement_profile: pragmatic
  gate_block_on:
    - new_reliability_rating=E
    - new_security_rating=E
    - new_maintainability_rating=E
    - new_coverage<80
    - new_duplicated_lines_density>5
  fail_on:
    - BLOCKER
    - CRITICAL
  ignore_on:
    - INFO
  max_scan_retries: 3
  scanner:
    sources: "src,public,lib"
    exclusions: "**/node_modules/**,**/fake-apps/**,**/scripts/**,**/playground/**,**/dist/**,**/build/**,**/*.min.js"
    test_inclusions: "**/*.test.js,**/*.spec.js,**/tests/**,**/__tests__/**"
    coverage_exclusions: "**/tests/**,**/__tests__/**,**/*.test.js,**/*.spec.js"
    disabled_rules:
      - "javascript:S1116"
      - "javascript:S3776"

# Git (post-approval)
git:
  auto_commit: false
  auto_push: false
  auto_pr: false
  auto_rebase: true
  branch_prefix: feat/

# Output
output:
  report_dir: ./.reviews
  log_level: info

# Session limits
session:
  max_iteration_minutes: 15
  max_total_minutes: 120
  max_budget_usd: null
  fail_fast_repeats: 2
